<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Role Model Lesson</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }

  .text-box {
    font-size: 22px;
    margin: 20px;
  }

  #arabic {
    direction: rtl;
    text-align: right;
  }

  button {
    font-size: 18px;
    margin: 5px;
    padding: 10px 15px;
    cursor: pointer;
  }

  details {
    margin: 15px;
    font-size: 20px;
  }

  summary {
    cursor: pointer;
    font-weight: bold;
  }
</style>
</head>

<body>

<h2>Role Model Lesson</h2>

<!-- Arabic always visible -->
<div class="text-box" id="arabic"></div>

<!-- English hidden/show -->
<details>
  <summary>Show English</summary>
  <div class="text-box" id="english"></div>
</details>

<!-- Controls -->
<button onclick="speak(current.ar)">🔊 Arabic</button>
<button onclick="speak(current.en)">🔊 English</button>
<br>
<button onclick="prev()">⏮ Previous</button>
<button onclick="next()">⏭ Next</button>

<script>
let data = [];
let index = 0;
let current = {};
let voices = [];

// Load voices
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
};

// Load JSON
fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    show();
  });

// Display text
function show() {
  current = data[index];
  document.getElementById("english").textContent = current.en;
  document.getElementById("arabic").textContent = current.ar;

  // Close English each time (so students guess first)
  document.querySelector("details").open = false;
}

// Speak function
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  if (/[\u0600-\u06FF]/.test(text)) {
    msg.lang = "ar-SA";
    const arabicVoice = voices.find(v => v.lang.startsWith("ar"));
    if (arabicVoice) msg.voice = arabicVoice;
  } else {
    msg.lang = "en-US";
    const englishVoice = voices.find(v => v.lang.startsWith("en"));
    if (englishVoice) msg.voice = englishVoice;
  }

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// Navigation
function next() {
  if (index < data.length - 1) {
    index++;
    show();
  }
}

function prev() {
  if (index > 0) {
    index--;
    show();
  }
}
</script>

</body>
</html>
