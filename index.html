<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Model Lesson</title>

<style>
  :root {
    --main-font: system-ui, -apple-system, Arial, sans-serif;
  }

  body {
    font-family: var(--main-font);
    margin: 0;
    padding: 16px;
    line-height: 1.5;
    background: #f9f9f9;
  }

  h2 {
    font-size: 22px;
    margin-bottom: 5px;
  }

  #progress {
    font-size: 16px;
    color: #555;
    margin-bottom: 10px;
  }

  .container {
    max-width: 700px;
    margin: auto;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  .text-box {
    font-size: 20px;
    margin: 12px 0;
    word-wrap: break-word;
  }

  #arabic {
    direction: rtl;
    text-align: right;
    font-size: 22px;
  }

  details summary {
    font-weight: bold;
    font-size: 18px;
    padding: 10px 0;
  }

  .controls {
    display: grid;
    gap: 10px;
    margin-top: 10px;
  }

  .row-2 {
    grid-template-columns: 1fr 1fr;
  }

  button {
    font-size: 18px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #007bff;
    color: white;
  }

  button:active {
    transform: scale(0.97);
  }

  button:disabled {
    background: #ccc;
  }

  label {
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type="checkbox"] {
    transform: scale(1.3);
  }

  @supports(padding: max(0px)) {
    body {
      padding-bottom: max(16px, env(safe-area-inset-bottom));
    }
  }
</style>
</head>

<body>

<div class="container">

<h2>Listen and Learn</h2>
<p id="progress"></p>

<div class="card">
  <div class="text-box" id="arabic"></div>

  <details>
    <summary>Show English</summary>
    <div class="text-box" id="english"></div>
  </details>
</div>

<div class="card">
  <label>
    <input type="checkbox" id="autoSpeak">
    Auto-play (Arabic → English)
  </label>
</div>

<div class="card controls row-2">
  <button onclick="speak(current.ar)">🔊 Arabic</button>
  <button onclick="speak(current.en)">🔊 English</button>
</div>

<div class="card controls row-2">
  <button id="prevBtn" onclick="prev()">⏮ Previous</button>
  <button id="nextBtn" onclick="next()">⏭ Next</button>
</div>

</div>
 <footer>
        <p>&copy; 2026 Created by: Eltayeb Ali Abdallah Mohamed. All rights reserved.</p>
    </footer>

<script>
let data = [];
let index = 0;
let current = {};
let voices = [];

// Load voices
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
};

// Load JSON
fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    show();
  });

// Show content
function show() {
  current = data[index];

  document.getElementById("english").textContent = current.en;
  document.getElementById("arabic").textContent = current.ar;

  // ✅ Update progress
  document.getElementById("progress").textContent =
    (index + 1) + " / " + data.length;

  document.querySelector("details").open = false;

  updateButtons();

  if (document.getElementById("autoSpeak").checked) {
    speakSequence();
  }
}

// Buttons state
function updateButtons() {
  document.getElementById("prevBtn").disabled = (index === 0);
  document.getElementById("nextBtn").disabled = (index === data.length - 1);
}

// Auto sequence
function speakSequence() {
  speechSynthesis.cancel();

  const ar = new SpeechSynthesisUtterance(current.ar);
  const en = new SpeechSynthesisUtterance(current.en);

  const arVoice = voices.find(v => v.lang.startsWith("ar"));
  const enVoice = voices.find(v => v.lang.startsWith("en"));

  if (arVoice) {
    ar.voice = arVoice;
    ar.lang = "ar-SA";
  }

  if (enVoice) {
    en.voice = enVoice;
    en.lang = "en-US";
  }

  ar.onend = () => speechSynthesis.speak(en);
  speechSynthesis.speak(ar);
}

// Speak single
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);

  if (/[\u0600-\u06FF]/.test(text)) {
    msg.lang = "ar-SA";
    const v = voices.find(x => x.lang.startsWith("ar"));
    if (v) msg.voice = v;
  } else {
    msg.lang = "en-US";
    const v = voices.find(x => x.lang.startsWith("en"));
    if (v) msg.voice = v;
  }

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// Navigation
function next() {
  if (index < data.length - 1) {
    index++;
    show();
  }
}

function prev() {
  if (index > 0) {
    index--;
    show();
  }
}
</script>

</body>
</html>
